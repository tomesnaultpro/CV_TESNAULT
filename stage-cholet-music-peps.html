<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cholet Music Peps — Tom Esnault</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .coming-wrap {
      min-height: calc(100vh - var(--nav-h));
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg);
      padding: 60px 40px;
    }
    .coming-card {
      background: var(--color-white);
      border: 1px solid var(--color-border);
      border-top: 5px solid var(--color-dark);
      border-radius: var(--radius-lg);
      padding: 60px 64px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .coming-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.65rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--color-mid);
      margin-bottom: 28px;
      transition: color 0.15s;
    }
    .coming-back:hover { color: var(--color-dark); }
    .coming-icon { font-size: 2.2rem; margin-bottom: 16px; }
    .coming-tag {
      font-size: 0.62rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--color-mid);
      margin-bottom: 14px;
    }
    .coming-title {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: normal;
      color: var(--color-dark);
      line-height: 1.15;
      margin-bottom: 10px;
    }
    .coming-line {
      width: 32px;
      height: 2px;
      background: var(--color-dark);
      margin: 22px auto;
      border-radius: 1px;
    }
    .coming-desc {
      font-size: 0.82rem;
      color: var(--color-text-2);
      line-height: 1.75;
      margin-bottom: 28px;
    }
    .coming-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--color-mid);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 7px 16px;
    }
    @media (max-width: 600px) {
      .coming-card { padding: 36px 24px; }
      .coming-title { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-brand">
    <span class="nav-brand-name">Tom Esnault</span>
    <span class="nav-brand-sub">Portfolio</span>
  </a>
  <button class="nav-burger" onclick="toggleMenu()" aria-label="Menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <div class="nav-links" id="navLinks">
    <a href="experience.html">Expérience</a>
    <a href="projet.html">Projet</a>
    <a href="association.html">Association</a>
  </div>
</nav>

<div class="coming-wrap">
  <div style="width:100%; max-width:520px; margin:0 auto;">
    <a href="experience.html" class="coming-back">&#8592; Retour aux expériences</a>
    <div class="coming-card">
      <div class="coming-icon">🔊</div>
      <p class="coming-tag">Stage · 4 semaines</p>
      <h1 class="coming-title">Cholet Music Peps</h1>
      <div class="coming-line"></div>
      <p class="coming-desc">Prestataire en sonorisation et éclairage — installation de systèmes son/lumière et régie de spectacles.</p>
      <span class="coming-badge">&#9679; Contenu à venir</span>
    </div>
  </div>
</div>

<footer class="site-footer">
  <span class="footer-name">Tom Esnault</span>
  <div class="footer-links">
    <a href="index.html">Accueil</a>
    <a href="experience.html">Expérience</a>
    <a href="projet.html">Projets</a>
    <a href="association.html">Associations</a>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
